# keepalived.example.conf
#
# RoadAEye - Keepalived VRRP 설정 예시
# MySQL 고가용성(HA)을 위해 두 DB 노드가 Virtual IP(VIP)를 공유합니다.
#
# 실제 배포 시 <...> 플레이스홀더를 환경에 맞게 교체하세요.
# MASTER 노드와 BACKUP 노드는 priority 값으로 구분합니다.
#   MASTER 노드: state MASTER, priority 110
#   BACKUP 노드: state BACKUP, priority 100

global_defs {
    router_id ROADAEYE_DB
}

vrrp_script check_mysql {
    script "/etc/keepalived/check_mysql.sh"
    interval 3      # 3초마다 헬스체크 실행
    weight  -20     # 실패 시 priority를 20 낮춤
    fall    2       # 2회 연속 실패 시 BACKUP으로 전환
    rise    2       # 2회 연속 성공 시 MASTER로 복귀
}

vrrp_instance VI_MYSQL {
    # MASTER 노드는 MASTER, BACKUP 노드는 BACKUP으로 변경하세요.
    state MASTER
    interface <NETWORK_INTERFACE>    # 예: eth0, ens3, enp3s0

    virtual_router_id 51             # 두 노드 동일 값 사용 (1~255)
    priority 110                     # MASTER: 110 / BACKUP: 100

    advert_int 1

    unicast_src_ip <LOCAL_NODE_IP>   # 이 노드의 실제 IP 주소
    unicast_peer {
        <PEER_NODE_IP>               # 상대 노드의 실제 IP 주소
    }

    authentication {
        auth_type PASS
        # 경고: 실제 비밀번호는 이 파일에 입력한 뒤 저장소에 커밋하지 마세요.
        # 두 노드에 동일한 값을 사용해야 합니다.
        auth_pass <KEEPALIVED_AUTH_PASSWORD>
    }

    virtual_ipaddress {
        <VIRTUAL_IP>                 # MySQL 클라이언트가 접속할 가상 IP
    }

    track_script {
        check_mysql
    }
}
